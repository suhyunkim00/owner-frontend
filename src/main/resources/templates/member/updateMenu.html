<script>
        var today = new Date();

        var currentYear = today.getDate();
        var currentMonth = today.getMonth()+1;
        var currentDate = today.getDate();

        var selectYear = document.getElementById("year");
        for (var i = 0; i < selectYear.options.length; i++) {
            if (parseInt(selectYear.options[i].value) === currentYear) {
                selectYear.selectedIndex = i;
                break;
            }
        }

        var selectMonth = document.getElementById("month");
        for (var i = 0; i < selectMonth.options.length; i++) {
            if (parseInt(selectMonth.options[i].value) === currentMonth) {
                selectMonth.selectedIndex = i;
                break;
            }
        }

        var selectDate = document.getElementById("date");
        for (var i = 0; i < selectDate.options.length; i++) {
            if (parseInt(selectDate.options[i].value) === currentDate) {
                selectDate.selectedIndex = i;
                break;
            }
        }
    </script>
