<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../css/passwordResetStyle.css">
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
</head>
<body>

    <header>
        <img src="/img/semohan-logo.png" alt="logo">
    </header>

    <form id="newPassword" method="post" action="">

        <label for="username">아이디</label>
        <div>
            <input class="blank" type="text" id="username" value="">
        </div>

        <label for="password">비밀번호</label>
        <div>
            <input class="blank" type=password name="pwd" id = "password" value="">
            <img src="/img/lock.png" alt="lock">
        </div>


        <label for="passwordCheck">비밀번호 재확인</label>
        <div>
            <input class="blank" type="password" id="passwordCheck" value="">
            <img src="/img/check.png" alt="check">
        </div>


        <label for=phoneNum>휴대전화</label>
        <div>
            <input class="blank" type="text" name="phoneNum" id="phoneNum">
            <input class="button" type="button" value="인증번호">
        </div>


        <input class="blank" type="number" name="certificationNum" id="certificationNum" placeholder = "인증번호를 입력하세요">
        <input class="button" type="submit" value="비밀번호 변경">



    </form>
</body>
</html>
